<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Idea Wall</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Animated Gradient Background -->
<div class="gradient-bg"></div>

<!-- Floating Shapes -->
<div class="floating-shape shape1"></div>
<div class="floating-shape shape2"></div>
<div class="floating-shape shape3"></div>

<header>
    <h1>✨ Creative Idea Wall</h1>
    <p>Capture your thoughts beautifully</p>
</header>

<div class="form glass-card">
    <input type="text" id="title" placeholder="Idea title...">
    <textarea id="description" placeholder="Describe your idea..."></textarea>
    <button onclick="addNote()">Add Idea</button>
</div>

<div id="notesContainer" class="notes-grid"></div>

<script src="script.js"></script>
</body>
</html>
