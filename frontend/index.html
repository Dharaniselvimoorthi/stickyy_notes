<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Secret Board</title>

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Cursor Glow -->
<div class="cursor-glow"></div>

<!-- Spotlight -->
<div class="spotlight"></div>

<!-- Cork Board Background -->
<div class="board"></div>

<!-- Floating Particles -->
<div class="particles"></div>

<h1 class="title">🕯 Midnight Secret Board</h1>

<div class="form glass">
    <input type="text" id="title" placeholder="Secret Title...">
    <textarea id="description" placeholder="Write your hidden memory..."></textarea>
    <button onclick="addNote()" class="ripple-btn">✉ Seal the Memory</button>
</div>

<div id="notesContainer" class="notes"></div>

<script src="script.js"></script>

</body>
</html>
