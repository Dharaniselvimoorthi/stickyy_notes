<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secret Vintage Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Handwritten Font -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

    <!-- Existing CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Vintage Dark Overlay -->
    <div class="vintage-overlay"></div>

    <!-- Floating Dust Texture -->
    <div class="dust"></div>

    <!-- Floating Blobs (optional glow mix) -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- Title -->
    <h1 class="title">🕯 Secret Vintage Notes</h1>

    <!-- Input Form -->
    <div class="form">
        <input type="text" id="title" placeholder="Write your secret title...">
        <textarea id="description" placeholder="Your hidden message..."></textarea>
        <button onclick="addNote()">✉ Add Secret Note</button>
    </div>

    <!-- Notes Board -->
    <div id="notesContainer" class="notes"></div>

    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
