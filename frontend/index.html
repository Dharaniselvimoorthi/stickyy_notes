<!DOCTYPE html>
<html>
<head>
    <title>Glow Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Background -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <h1 class="title">✨ Glow Notes</h1>

    <div class="form">
        <input type="text" id="title" placeholder="Note Title">
        <textarea id="description" placeholder="Write something beautiful..."></textarea>
        <button onclick="addNote()">Add Note</button>
    </div>

    <div id="notesContainer" class="notes"></div>

<script src="script.js"></script>
</body>
</html>
